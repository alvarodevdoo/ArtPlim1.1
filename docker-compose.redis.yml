version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: artplim-redis
    ports:
      - "6380:6379"
    command: redis-server --requirepass artplim123
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "artplim123", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - REDIS_PASSWORD=artplim123

volumes:
  redis_data:
    driver: local