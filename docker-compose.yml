version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: artplim_postgres
    environment:
      POSTGRES_DB: artplim_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - artplim_network

  # Redis (para cache e filas)
  redis:
    image: redis:7-alpine
    container_name: artplim_redis
    ports:
      - "6380:6379"
    networks:
      - artplim_network

  # Backend (Fastify + Prisma)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artplim_backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres123@postgres:5432/artplim_erp?schema=public"
      JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
      PORT: 3001
      NODE_ENV: development
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - artplim_network
    command: npm run dev

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: artplim_frontend
    environment:
      VITE_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - artplim_network
    command: npm run dev

volumes:
  postgres_data:

networks:
  artplim_network:
    driver: bridge